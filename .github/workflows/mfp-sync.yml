name: MyFitnessPal sync

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/mfp-sync/requirements.txt
      - name: Run sync
        env:
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
          MFP_WEBHOOK_URL: ${{ secrets.MFP_WEBHOOK_URL }}
          MFP_WEBHOOK_SECRET: ${{ secrets.MFP_WEBHOOK_SECRET }}
          MFP_USER_ID: ${{ secrets.MFP_USER_ID }}
        run: python scripts/mfp-sync/sync.py
